<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>川電 資格一覧表</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (JSX変換用) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 🌟 Firebaseの通信ケーブル -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 安全なアイコン部品（外部部品との衝突を防止） ---
        const IconUserPlus = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>);
        const IconInfo = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>);
        const IconLoader = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
        const IconAlert = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);
        const IconPlay = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>);

        // ==========================================
        // Firebaseの鍵（修正済み）
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDDIXxZGVZp4Zp2ri4QkmPu2IMG0btuCPI",
            authDomain: "kawaden-shikaku.firebaseapp.com",
            projectId: "kawaden-shikaku",
            storageBucket: "kawaden-shikaku.firebasestorage.app",
            messagingSenderId: "319150839014",
            appId: "1:319150839014:web:af0a28cf637965f7bb5727",
            measurementId: "G-ZRZGSZ7DPJ"
        };
        
        // Firebaseの起動
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- 初期データ（資格マスター） ---
        const defaultQualifications = [
            { id: 'q13', name: '第一種電気工事士' },
            { id: 'q14', name: '第二種電気工事士' },
            { id: 'q15', name: '1級電気施工管理' },
            { id: 'q16', name: '2級電気施工管理' },
            { id: 'q17', name: '認定電気工事従事者' },
            { id: 'q18', name: '電気工事作業指揮者', isKinden: true },
            { id: 'q19', name: '甲4類消防設備士' },
            { id: 'q20', name: '職長・安全衛生責任者', isKinden: true },
            { id: 'q28', name: 'フルハーネス講習', isKinden: true },
            { id: 'q1', name: '低圧', isKinden: true },
            { id: 'q2', name: '高圧', isKinden: true },
            { id: 'q3', name: '酸欠', isKinden: true },
            { id: 'q7', name: '酸欠主任者' },
            { id: 'q4', name: '高所作業車(10m未満)' },
            { id: 'q8', name: '高所作業車(10m以上)' },
            { id: 'q5', name: '足場作業' },
            { id: 'q9', name: '足場主任者' },
            { id: 'q6', name: '玉掛(1t未満)' },
            { id: 'q10', name: '玉掛(1t以上)' },
            { id: 'q21', name: '小型移動式クレーン' },
            { id: 'q26', name: 'クレーン運転5ｔ未満' },
            { id: 'q27', name: '巻き上げ機の運転' },
            { id: 'q22', name: '小型車両建設教育' },
            { id: 'q23', name: '丸ノコ等取替作業', isKinden: true },
            { id: 'q24', name: '自由研削といし', isKinden: true },
            { id: 'q25', name: '電動工具取扱教育', isKinden: true },
            { id: 'q11', name: '危険感受性', isKinden: true },
            { id: 'q12', name: '送電教育', isKinden: true }
        ];

        const defaultWorkers = [
            { id: 'w1', name: '川口 雄志', quals: ['q13', 'q15', 'q1', 'q2', 'q3', 'q20', 'q28'] },
            { id: 'w2', name: '石橋 広行', quals: ['q14', 'q1', 'q4', 'q5', 'q28'] },
            { id: 'w3', name: '門田 友彰', quals: ['q14', 'q1', 'q5', 'q6', 'q28'] },
            { id: 'w4', name: '小中原 満', quals: ['q1', 'q2'] },
            { id: 'w5', name: '池田 元樹', quals: ['q1', 'q5', 'q20'] },
            { id: 'w6', name: '浜谷 政和', quals: ['q1', 'q6'] },
            { id: 'w7', name: '森 拓也', quals: ['q1', 'q4'] },
            { id: 'w8', name: '松本 大輔', quals: ['q1'] },
            { id: 'w9', name: '林 涼介', quals: ['q1', 'q2', 'q28'] },
            { id: 'w10', name: '小田 照行', quals: ['q1'] },
            { id: 'w11', name: '田子 昭一', quals: ['q1', 'q3'] },
            { id: 'w12', name: '橋本 晃生', quals: ['q1'] },
            { id: 'w13', name: '柳井 東弥', quals: ['q1', 'q5'] },
            { id: 'w14', name: '久保田 浩行', quals: ['q1', 'q6'] },
            { id: 'w15', name: '豊岡 寿明', quals: ['q1'] },
        ];

        function App() {
            const [qualifications, setQualifications] = useState(defaultQualifications);
            const [workers, setWorkers] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newWorkerName, setNewWorkerName] = useState('');
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [authError, setAuthError] = useState(false);
            const [useLocalMode, setUseLocalMode] = useState(false);

            // ① 認証
            useEffect(() => {
                auth.signInAnonymously().catch(error => {
                    console.error("認証警告:", error);
                    setAuthError(true);
                    setIsLoading(false);
                });
                const unsubscribe = auth.onAuthStateChanged(user => {
                    if (user) {
                        setUser(user);
                        setAuthError(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // ② 同期
            useEffect(() => {
                if (!user || useLocalMode) return;
                const docRef = db.collection('kawaden_data').doc('main_list');
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.qualifications) setQualifications(data.qualifications);
                        if (data.workers) setWorkers(data.workers);
                        setIsLoading(false);
                    } else {
                        docRef.set({ qualifications: defaultQualifications, workers: defaultWorkers }).then(() => setIsLoading(false));
                    }
                }, error => {
                    console.error("同期エラー:", error);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user, useLocalMode]);

            const updateCloud = (newWorkers) => {
                if (!user || useLocalMode) return;
                db.collection('kawaden_data').doc('main_list').set({ workers: newWorkers, qualifications: qualifications });
            };

            const toggleQual = (workerId, qualId) => {
                const newWorkers = workers.map(w => w.id === workerId ? { ...w, quals: w.quals.includes(qualId) ? w.quals.filter(id => id !== qualId) : [...w.quals, qualId] } : w);
                setWorkers(newWorkers);
                updateCloud(newWorkers);
            };

            const handleAddWorkerSubmit = (e) => {
                e.preventDefault();
                if (!newWorkerName.trim()) return;
                const newWorkers = [...workers, { id: `w${Date.now()}`, name: newWorkerName.trim(), quals: [] }];
                setWorkers(newWorkers);
                updateCloud(newWorkers);
                setNewWorkerName('');
                setShowAddModal(false);
            };

            if (authError && !useLocalMode) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
                        <div className="bg-white border-2 border-red-200 p-6 rounded-xl max-w-md shadow-lg text-center">
                            <IconAlert className="w-12 h-12 text-red-500 mx-auto mb-4" />
                            <h2 className="text-xl font-bold mb-2">認証設定が必要です</h2>
                            <p className="text-sm text-gray-600 mb-6">Firebaseの「Authentication」で「匿名」を有効にしてください。</p>
                            <button onClick={() => { setUseLocalMode(true); setIsLoading(false); }} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                                オフライン版を試す
                            </button>
                        </div>
                    </div>
                );
            }

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
                        <IconLoader className="animate-spin text-blue-600 mb-4 w-12 h-12" />
                        <p className="text-gray-600 font-bold tracking-widest">立ち上げ中...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white text-sm flex flex-col">
                    <header className={`text-white p-4 shadow-md flex justify-between items-center ${useLocalMode ? 'bg-gray-600' : 'bg-blue-800'}`}>
                        <div className="flex items-center gap-2">
                            <h1 className="text-xl font-bold">有資格者一覧表</h1>
                            <span className="text-[10px] bg-white/20 px-2 py-0.5 rounded-full border border-white/30">
                                {useLocalMode ? 'OFFLINE' : 'ONLINE'}
                            </span>
                        </div>
                        <button onClick={() => setShowAddModal(true)} className="bg-white/20 hover:bg-white/30 p-2 rounded-lg transition-colors">
                            <IconUserPlus className="w-5 h-5" />
                        </button>
                    </header>
                    <div className="p-2 bg-blue-50 border-b border-blue-100 flex items-center gap-2 text-xs text-blue-800 font-bold italic">
                        <IconInfo className="w-4 h-4 text-blue-600" />
                        青い列：きんでん大阪支社講習対象
                    </div>
                    <div className="flex-1 overflow-auto bg-gray-50 p-2 sm:p-4">
                        <div className="bg-white shadow-sm border border-gray-300 inline-block min-w-full rounded-lg overflow-hidden">
                            <table className="min-w-full border-collapse">
                                <thead>
                                    <tr>
                                        <th className="sticky top-0 left-0 z-30 bg-gray-200 border border-gray-300 p-2 min-w-[100px] shadow-[1px_1px_0_#d1d5db]">氏名</th>
                                        {qualifications.map(q => (
                                            <th key={q.id} className={`sticky top-0 z-20 border border-gray-300 p-1 w-10 min-w-[40px] shadow-[0_1px_0_#d1d5db] ${q.isKinden ? 'bg-blue-100' : 'bg-gray-100'}`}>
                                                <div className="flex flex-col items-center justify-end h-40">
                                                    <span style={{ writingMode: 'vertical-rl', textOrientation: 'upright' }} className="text-xs font-medium tracking-widest text-gray-700 h-full text-center">{q.name}</span>
                                                </div>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {workers.map((worker) => (
                                        <tr key={worker.id} className="hover:bg-yellow-50 transition-colors">
                                            <td className="sticky left-0 z-10 bg-white border border-gray-300 p-2 font-bold text-gray-800 shadow-[1px_0_0_#d1d5db] whitespace-nowrap">{worker.name}</td>
                                            {qualifications.map(q => {
                                                const hasQual = worker.quals.includes(q.id);
                                                return (
                                                    <td key={q.id} onClick={() => toggleQual(worker.id, q.id)}
                                                        className={`border border-gray-300 text-center cursor-pointer select-none text-lg font-bold
                                                        ${hasQual ? 'text-green-600' : 'text-gray-200'}
                                                        ${q.isKinden ? 'bg-blue-50/20' : ''} hover:bg-blue-100`}>
                                                        {hasQual ? '◯' : '・'}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <IconUserPlus className="text-blue-600" /> 職人さんの追加
                                </h2>
                                <form onSubmit={handleAddWorkerSubmit}>
                                    <input type="text" value={newWorkerName} onChange={e => setNewWorkerName(e.target.value)} placeholder="お名前" className="w-full border-2 border-gray-200 p-3 mb-6 rounded-xl focus:border-blue-600 outline-none transition-colors" autoFocus />
                                    <div className="flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowAddModal(false)} className="px-5 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded-lg">戻る</button>
                                        <button type="submit" className="px-5 py-2 bg-blue-600 text-white font-bold rounded-lg shadow-lg shadow-blue-200">追加する</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
