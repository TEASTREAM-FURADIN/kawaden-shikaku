        // --- 画像圧縮用関数 ---
        const compressImage = (file, maxWidth = 1000) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        // --- 📅 期限計算ロジック ---
        const calcKou4Expire = (dateStr, isFirst) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            let year = d.getFullYear();
            if (d.getMonth() > 3 || (d.getMonth() === 3 && d.getDate() >= 1)) {
                year++;
            }
            const addYears = isFirst ? 2 : 5;
            return `${year + addYears}-03-31`; 
        };

        const calcNormalExpire = (dateStr, years) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            d.setFullYear(d.getFullYear() + years);
            d.setDate(d.getDate() - 1);
            return d.toISOString().split('T')[0];
        };

        const getDaysUntilExpire = (dateStr) => {
            if (!dateStr) return 999;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const exp = new Date(dateStr);
            const diffTime = exp - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        // 🌟 健康診断の期限判定ロジック
        const getHealthStatus = (dateStr) => {
            if (!dateStr) return { text: '未設定', color: 'text-gray-400', bg: '', isAlert: false };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const healthDate = new Date(dateStr);
            const expireDate = new Date(healthDate);
            expireDate.setFullYear(expireDate.getFullYear() + 1); 
            
            const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                return { text: '期限切れ', color: 'text-red-600', bg: 'bg-red-100', isAlert: true };
            } else if (diffDays <= 30) {
                return { text: '更新間近', color: 'text-orange-600', bg: 'bg-orange-100', isAlert: true };
            } else {
                return { text: dateStr.replace(/-/g, '/'), color: 'text-blue-600', bg: '', isAlert: false };
            }
        };

            { id: 'q1', name: '低圧', isKinden: true }, 
            { id: 'q2', name: '高圧', isKinden: true },

            { id: 'q7', name: '酸欠主任者' },

            { id: 'q8', name: '高所作業車(10m以上)' },
            { id: 'q5', name: '足場作業' },
            { id: 'q9', name: '足場主任者' },
            { id: 'q6', name: '玉掛(1t未満)' },
            { id: 'q10', name: '玉掛(1t以上)' },
            { id: 'q21', name: '小型移動式クレーン' },
            { id: 'q26', name: 'クレーン運転5ｔ未満' },
            { id: 'q27', name: '巻き上げ機の運転' },
            { id: 'q22', name: '小型車両建設教育' },
            { id: 'q23', name: '丸ノコ等取替作業', isKinden: true },
            { id: 'q24', name: '自由研削といし', isKinden: true },
            { id: 'q25', name: '電動工具取扱教育', isKinden: true },
            { id: 'q11', name: '危険感受性', isKinden: true },
            { id: 'q12', name: '送電教育', isKinden: true, requiresUpdate: true, updateIntervalYears: 1 }
        ];

        const defaultWorkers = [
            { id: 'w1', name: '川口 雄志', healthDate: '', quals: ['q13', 'q15', 'q1', 'q2', 'q3', 'q20', 'q28'], qualDetails: {} },
            { id: 'w2', name: '石橋 広行', healthDate: '', quals: ['q14', 'q1', 'q4', 'q5', 'q28'], qualDetails: {} }
        ];

        function App() {
            const [qualifications, setQualifications] = useState(defaultQualifications);
            const [workers, setWorkers] = useState(defaultWorkers);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newWorkerName, setNewWorkerName] = useState('');
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isEditMode, setIsEditMode] = useState(false);
            
            // 🌟 ズーム倍率のState (0.3 ～ 2.0まで許可)
            const [zoomScale, setZoomScale] = useState(1);

            const [selectedWorkerId, setSelectedWorkerId] = useState(null);
            const [workerImages, setWorkerImages] = useState({});
            const [fullScreenImage, setFullScreenImage] = useState(null);
            
            const [dbSetupRequired, setDbSetupRequired] = useState(false);
            const [rulesSetupRequired, setRulesSetupRequired] = useState(false);
            const [authError, setAuthError] = useState(false);
            const [useLocalMode, setUseLocalMode] = useState(false); 

            const handleFirestoreError = (error) => {
                const msg = error.message || "";
                const code = error.code || "";
                if (code === 'not-found' || msg.includes('has not been used') || msg.includes('does not exist')) {
                    setDbSetupRequired(true);
                } else if (code === 'permission-denied' || msg.includes('Missing or insufficient permissions')) {
                    setRulesSetupRequired(true);
                } else {
                    setAuthError(true);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                auth.signInAnonymously().catch(e => {
                    setAuthError(true);
                    setIsLoading(false);
                });
                const unsubscribe = auth.onAuthStateChanged(user => {
                    if (user) { setUser(user); setAuthError(false); }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || useLocalMode) {
                    if (useLocalMode) setIsLoading(false);
                    return;
                }
                
                const docRef = db.collection('kawaden_data').doc('main_list');
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        const loadedQuals = data.qualifications || defaultQualifications;
                        const mergedQuals = loadedQuals.map(loadedQual => {
                            const defaultQual = defaultQualifications.find(dq => dq.id === loadedQual.id);
                            return defaultQual ? { 
                                ...loadedQual, 
                                requiresUpdate: defaultQual.requiresUpdate, 
                                updateIntervalYears: defaultQual.updateIntervalYears, 
                                isKou4: defaultQual.isKou4 
                            } : loadedQual;
                        });
                        
                        setQualifications(mergedQuals);
                        setWorkers(data.workers || defaultWorkers);
                        setIsLoading(false);
                    } else {
                        docRef.set({ qualifications: defaultQualifications, workers: defaultWorkers })
                             .then(() => setIsLoading(false))
                             .catch(handleFirestoreError);
                    }
                }, handleFirestoreError);
                return () => unsubscribe();
            }, [user, useLocalMode]);

            useEffect(() => {
                if (!selectedWorkerId || !user || useLocalMode) return;
                
                const imgRef = db.collection('kawaden_images').doc(selectedWorkerId);
                const unsubscribe = imgRef.onSnapshot(doc => {
                    if (doc.exists) setWorkerImages(doc.data() || {});
                    else setWorkerImages({});
                }, e => console.error("画像取得エラー:", e));
                return () => unsubscribe();
            }, [selectedWorkerId, user, useLocalMode]);

            const updateCloud = (newWorkers, newQuals) => {
                if (!user || useLocalMode) return;
                db.collection('kawaden_data').doc('main_list').set({
                    workers: newWorkers || workers,
                    qualifications: newQuals || qualifications
                }).catch(handleFirestoreError);
            };

            const updateWorkerHealth = (id, newDate) => {
                const newWorkers = workers.map(w => w.id === id ? { ...w, healthDate: newDate } : w);
                setWorkers(newWorkers);
                updateCloud(newWorkers, null);
            };

            const updateQualDetail = (workerId, qualId, field, value, currentQual) => {
                const newWorkers = workers.map(w => {
                    if (w.id !== workerId) return w;
                    
                    const details = w.qualDetails || {};
                    const qDetail = details[qualId] || { isFirst: true };
                    const updatedQDetail = { ...qDetail, [field]: value };
                    
                    if (field === 'acquiredDate' || field === 'isFirst') {
                        const acqDate = field === 'acquiredDate' ? value : qDetail.acquiredDate;
                        const isFirst = field === 'isFirst' ? value : qDetail.isFirst !== false;
                        
                        if (currentQual.isKou4) {
                            updatedQDetail.expireDate = calcKou4Expire(acqDate, isFirst);
                        } else if (currentQual.updateIntervalYears) {
                            updatedQDetail.expireDate = calcNormalExpire(acqDate, currentQual.updateIntervalYears);
                        }
                    }
                    
                    return {
                        ...w,
                        qualDetails: { ...details, [qualId]: updatedQDetail }
                    };
                });
                setWorkers(newWorkers);
                updateCloud(newWorkers, null);
            };

            const handleImageUpload = async (workerId, qualId, file) => {
                if (!file) return;
                try {
                    const compressedBase64 = await compressImage(file, 800);
                    if (!user || useLocalMode) {
                        setWorkerImages(prev => ({...prev, [qualId]: compressedBase64}));
                        return;
                    }
                    await db.collection('kawaden_images').doc(workerId).set({
                        [qualId]: compressedBase64
                    }, { merge: true });
                } catch (e) {
                    alert("画像の保存に失敗しました。");
                }
            };

            const handleImageDelete = async (workerId, qualId) => {
                if (!confirm("この写真を削除しますか？")) return;
                if (!user || useLocalMode) {
                    const newImages = {...workerImages};
                    delete newImages[qualId];
                    setWorkerImages(newImages);
                    return;
                }
                await db.collection('kawaden_images').doc(workerId).update({
                    [qualId]: firebase.firestore.FieldValue.delete()
                });
            };

            const toggleQual = (workerId, qualId) => {
                if (isEditMode) return;
                const newWorkers = workers.map(w => {
                    if (w.id === workerId) {
                        const hasQual = w.quals.includes(qualId);
                        return { ...w, quals: hasQual ? w.quals.filter(id => id !== qualId) : [...w.quals, qualId] };
                    }
                    return w;
                });
                setWorkers(newWorkers);
                updateCloud(newWorkers, null);
            };

            const moveItem = (list, setList, index, direction, isQual) => {
                const newList = [...list];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newList.length) return;
                [newList[index], newList[targetIndex]] = [newList[targetIndex], newList[index]];
                setList(newList);
                if (isQual) updateCloud(null, newList); else updateCloud(newList, null);
            };

            const renameItem = (id, newName, isQual) => {
                if (isQual) {
                    const newList = qualifications.map(q => q.id === id ? { ...q, name: newName } : q);
                    setQualifications(newList);
                    updateCloud(null, newList);
                } else {
                    const newList = workers.map(w => w.id === id ? { ...w, name: newName } : w);
                    setWorkers(newList);
                    updateCloud(newList, null);
                }
            };

            const deleteItem = (id, isQual) => {
                if (!confirm("本当に削除しますか？")) return;
                if (isQual) {
                    const newList = qualifications.filter(q => q.id !== id);
                    setQualifications(newList);
                    updateCloud(null, newList);
                } else {
                    const newList = workers.filter(w => w.id !== id);
                    setWorkers(newList);
                    updateCloud(newList, null);
                }
            };

            if (rulesSetupRequired && !useLocalMode) {
                return (
                    <div className="h-screen bg-gray-50 flex items-center justify-center p-6 text-center font-sans overflow-auto">
                        <div className="bg-white border-2 border-green-200 p-8 rounded-3xl max-w-lg shadow-xl">

                            <h2 className="text-2xl font-black text-gray-800 mb-4">データベースの鍵を開けてください！</h2>
                            <p className="text-gray-600 mb-6 leading-relaxed">
                                金庫の作成は成功しています！<br/>最後に、アプリから読み書きできるように「ルール（鍵）」を設定してください。
                            </p>
                            <button onClick={() => { setUseLocalMode(true); setIsLoading(false); }} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors shadow-lg mb-6 active:scale-95">
                                設定を後回しにして、まずはアプリを試す！
                            </button>
                            <div className="bg-gray-100 p-4 rounded-xl text-left text-sm text-gray-700 border border-gray-200">
                                <p className="font-bold mb-2">【ルールの変更手順】</p>
                                <ol className="list-decimal list-inside space-y-1 text-xs mb-3 font-bold">
                                    <li>Firebaseコンソールの「Firestore Database」を開く</li>
                                    <li>上部の<b>「ルール」</b>タブをクリック</li>
                                    <li>以下のコードに書き換えて<b>「公開」</b>を押す</li>
                                </ol>
                                <pre className="bg-gray-800 text-green-400 p-3 rounded-lg text-xs overflow-x-auto shadow-inner select-all">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}`}

                                <h2 className="text-xl font-black mb-6 text-gray-800 flex items-center gap-2">
                                    <IconUserPlus className="text-blue-600" /> 職人の新規追加
                                </h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault(); if (!newWorkerName.trim()) return;
                                    const nw = [...workers, { id: `w${Date.now()}`, name: newWorkerName.trim(), healthDate: '', quals: [], qualDetails: {} }];
                                    setWorkers(nw); updateCloud(nw, null); setNewWorkerName(''); setShowAddModal(false);
                                }}>
                                    <div className="mb-8">
                                        <label className="block text-xs font-bold text-gray-400 mb-2 px-1 uppercase tracking-widest">お名前</label>
                                        <input type="text" value={newWorkerName} onChange={e => setNewWorkerName(e.target.value)} placeholder="例：川口 雄志" className="w-full border-2 border-gray-100 p-3 rounded-2xl outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-50 transition-all text-lg font-bold" autoFocus />
                                    </div>
                                    <div className="flex justify-end gap-3 font-bold">
                                        <button type="button" onClick={() => setShowAddModal(false)} className="px-6 py-2 text-gray-400 hover:text-gray-600 transition-colors">戻る</button>
                                        <button type="submit" className="px-8 py-3 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-200 active:scale-95 transition-transform">追加する</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
