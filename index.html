        // --- 画像圧縮用関数 ---
        const compressImage = (file, maxWidth = 1000) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        // --- 📅 期限計算ロジック ---
        const calcKou4Expire = (dateStr, isFirst) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            let year = d.getFullYear();
            if (d.getMonth() > 3 || (d.getMonth() === 3 && d.getDate() >= 1)) {
                year++;
            }
            const addYears = isFirst ? 2 : 5;
            return `${year + addYears}-03-31`; 
        };

        const calcNormalExpire = (dateStr, years) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            d.setFullYear(d.getFullYear() + years);
            d.setDate(d.getDate() - 1);
            return d.toISOString().split('T')[0];
        };

        const getDaysUntilExpire = (dateStr) => {
            if (!dateStr) return 999;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const exp = new Date(dateStr);
            const diffTime = exp - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const getHealthStatus = (dateStr) => {
            if (!dateStr) return { text: '未設定', color: 'text-gray-400', bg: '', isAlert: false };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const healthDate = new Date(dateStr);
            const expireDate = new Date(healthDate);
            expireDate.setFullYear(expireDate.getFullYear() + 1); 
            
            const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                return { text: '期限切れ', color: 'text-red-600', bg: 'bg-red-100', isAlert: true };
            } else if (diffDays <= 30) {
                return { text: '更新間近', color: 'text-orange-600', bg: 'bg-orange-100', isAlert: true };

                return { text: dateStr.replace(/-/g, '/'), color: 'text-blue-600', bg: '', isAlert: false };
            }

            const handleFirestoreError = (error) => {
                const msg = error.message || "";
                const code = error.code || "";
                if (code === 'not-found' || msg.includes('has not been used') || msg.includes('does not exist')) {
                    setDbSetupRequired(true);
                } else if (code === 'permission-denied' || msg.includes('Missing or insufficient permissions')) {
                    setRulesSetupRequired(true);
                } else {
                    setAuthError(true);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                auth.signInAnonymously().catch(e => {
                    setAuthError(true);
                    setIsLoading(false);
                });
                const unsubscribe = auth.onAuthStateChanged(user => {
                    if (user) { setUser(user); setAuthError(false); }
                });
                
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                
                return () => {
                    unsubscribe();
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                };
            }, []);

            useEffect(() => {
                if (!user || useLocalMode) {
                    if (useLocalMode) setIsLoading(false);
                    return;
                }
                
                const docRef = db.collection('kawaden_data').doc('main_list');
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const remoteData = doc.data();
                        const localData = getLocalData();
                        const remoteTime = remoteData.lastUpdated || 0;
                        const localTime = localData.lastUpdated || 0;
                        
                        if (localTime > remoteTime) {
                            docRef.set(localData).catch(e => console.error(e));
                            setQualifications(localData.qualifications);
                            setWorkers(localData.workers);
                        } else {
                            const loadedQuals = remoteData.qualifications || defaultQualifications;
                            const mergedQuals = loadedQuals.map(loadedQual => {
                                const defaultQual = defaultQualifications.find(dq => dq.id === loadedQual.id);
                                return defaultQual ? { 
                                    ...loadedQual, 
                                    requiresUpdate: defaultQual.requiresUpdate, 
                                    updateIntervalYears: defaultQual.updateIntervalYears, 
                                    isKou4: defaultQual.isKou4 
                                } : loadedQual;
                            });
                            
                            setQualifications(mergedQuals);
                            setWorkers(remoteData.workers || defaultWorkers);
                            saveToLocal({ qualifications: mergedQuals, workers: remoteData.workers || defaultWorkers, lastUpdated: remoteTime });
                        }
                        setIsLoading(false);
                    } else {
                        const localData = getLocalData();
                        docRef.set(localData)
                             .then(() => setIsLoading(false))
                             .catch(handleFirestoreError);
                    }
                }, handleFirestoreError);
                return () => unsubscribe();
            }, [user, useLocalMode]);

            useEffect(() => {
                if (!selectedWorkerId || !user || useLocalMode) return;
                const imgRef = db.collection('kawaden_images').doc(selectedWorkerId);
                const unsubscribe = imgRef.onSnapshot(doc => {
                    if (doc.exists) setWorkerImages(doc.data() || {});

                return () => unsubscribe();
            }, [selectedWorkerId, user, useLocalMode]);

            const updateCloud = (newWorkers, newQuals) => {
                const timestamp = Date.now();
                const localData = { workers: newWorkers, qualifications: newQuals, lastUpdated: timestamp };
                saveToLocal(localData);
                if (!user || useLocalMode) return; 
                db.collection('kawaden_data').doc('main_list').set(localData).catch(handleFirestoreError);
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') setDeferredPrompt(null);
                } else {
                    alert('ブラウザの共有メニュー(↑)または設定(︙)から「ホーム画面に追加」を選択してください。');
                }
            };

            const updateWorkerHealth = (id, newDate) => {
                const newWorkers = workers.map(w => w.id === id ? { ...w, healthDate: newDate } : w);
                setWorkers(newWorkers);
                updateCloud(newWorkers, qualifications);
            };

            const updateQualDetail = (workerId, qualId, field, value, currentQual) => {
                const newWorkers = workers.map(w => {
                    if (w.id !== workerId) return w;
                    const details = w.qualDetails || {};
                    const qDetail = details[qualId] || { isFirst: true };
                    const updatedQDetail = { ...qDetail, [field]: value };
                    
                    if (field === 'acquiredDate' || field === 'isFirst') {
                        const acqDate = field === 'acquiredDate' ? value : qDetail.acquiredDate;
                        const isFirst = field === 'isFirst' ? value : qDetail.isFirst !== false;
                        if (currentQual.isKou4) {
                            updatedQDetail.expireDate = calcKou4Expire(acqDate, isFirst);
                        } else if (currentQual.updateIntervalYears) {
                            updatedQDetail.expireDate = calcNormalExpire(acqDate, currentQual.updateIntervalYears);
                        }
                    }
                    return { ...w, qualDetails: { ...details, [qualId]: updatedQDetail } };
                });
                setWorkers(newWorkers);
                updateCloud(newWorkers, qualifications);
            };

            const handleAddWorkerSubmit = (e) => {
                if (e) e.preventDefault();
                if (!newWorkerName.trim()) return;
                const nw = [...workers, { id: `w${Date.now()}`, name: newWorkerName.trim(), healthDate: '', quals: [], qualDetails: {} }];
                setWorkers(nw); 
                updateCloud(nw, qualifications); 
                setNewWorkerName(''); 
                setShowAddModal(false);
            };

            const handleAddQualSubmit = (e) => {
                if (e) e.preventDefault();
                if (!newQualName.trim()) return;
                const newQual = { 
                    id: `q${Date.now()}`, 
                    name: newQualName.trim(), 
                    requiresUpdate: newQualRequiresUpdate, 
                    updateIntervalYears: newQualRequiresUpdate ? newQualUpdateInterval : undefined,
                    isKinden: newQualIsKinden 
                };
                const newQuals = [...qualifications, newQual];
                setQualifications(newQuals);
                updateCloud(workers, newQuals);
                setNewQualName('');
                setNewQualIsKinden(false); 
                setNewQualRequiresUpdate(false);
                setNewQualUpdateInterval(5);
                setShowAddQualModal(false);
            };

            const handleImageUpload = async (workerId, qualId, file) => {

                try {

                    if (!user || useLocalMode) {
                        setWorkerImages(prev => ({...prev, [qualId]: compressedBase64}));
                        return;
                    }
                    await db.collection('kawaden_images').doc(workerId).set({ [qualId]: compressedBase64 }, { merge: true });
                } catch (e) {
                    alert("画像の保存に失敗しました。");
                }
            };

            const handleImageDelete = async (workerId, qualId) => {
                if (!confirm("この写真を削除しますか？")) return;
                if (!user || useLocalMode) {
                    const newImages = {...workerImages};
                    delete newImages[qualId];
                    setWorkerImages(newImages);
                    return;
                }
                await db.collection('kawaden_images').doc(workerId).update({ [qualId]: firebase.firestore.FieldValue.delete() });
            };

            const toggleQual = (workerId, qualId) => {
                if (isEditMode) return;
                const newWorkers = workers.map(w => {
                    if (w.id === workerId) {
                        const hasQual = w.quals.includes(qualId);
                        return { ...w, quals: hasQual ? w.quals.filter(id => id !== qualId) : [...w.quals, qualId] };
                    }
                    return w;
                });
                setWorkers(newWorkers);
                updateCloud(newWorkers, qualifications);
            };

            const moveItem = (list, setList, index, direction, isQual) => {
                const newList = [...list];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newList.length) return;
                [newList[index], newList[targetIndex]] = [newList[targetIndex], newList[index]];
                setList(newList);
                if (isQual) updateCloud(workers, newList);
                else updateCloud(newList, qualifications);
            };

            const renameItem = (id, newName, isQual) => {
                if (isQual) {
                    const newList = qualifications.map(q => q.id === id ? { ...q, name: newName } : q);
                    setQualifications(newList);
                    updateCloud(workers, newList);
                } else {
                    const newList = workers.map(w => w.id === id ? { ...w, name: newName } : w);
                    setWorkers(newList);
                    updateCloud(newList, qualifications);
                }
            };

            const deleteItem = (id, isQual) => {
                if (!confirm("本当に削除しますか？")) return;
                if (isQual) {
                    const newList = qualifications.filter(q => q.id !== id);
                    setQualifications(newList);
                    updateCloud(workers, newList);
                } else {
                    const newList = workers.filter(w => w.id !== id);
                    setWorkers(newList);
                    updateCloud(newList, qualifications);
                }
            };

            const toggleQualKinden = (qualId) => {
                const newQuals = qualifications.map(q => 
                    q.id === qualId ? { ...q, isKinden: !q.isKinden } : q
                );
                setQualifications(newQuals);
                updateCloud(workers, newQuals);
            };

            const toggleQualUpdate = (qualId) => {
                const qual = qualifications.find(q => q.id === qualId);
                if (!qual) return;

                if (qual.isKou4) {
                    const msg = qual.requiresUpdate ? "アラートをオフにしますか？" : "特殊ルールアラートをオンにしますか？";
                    if (confirm(`「${qual.name}」は特殊な更新ルールが設定されています。\n${msg}`)) {
                        const newQuals = qualifications.map(q => q.id === qualId ? { ...q, requiresUpdate: !q.requiresUpdate } : q);
                        setQualifications(newQuals);
                        updateCloud(workers, newQuals);
                    }
                    return;
                }

                const res = prompt(`「${qual.name}」の更新間隔（年）を入力してください。オフにする場合は「0」を入力。`, qual.requiresUpdate ? qual.updateIntervalYears : "5");

                    const years = parseInt(res);
                    const newQuals = qualifications.map(q => q.id === qualId ? { ...q, requiresUpdate: years > 0, updateIntervalYears: years > 0 ? years : undefined } : q);
                    setQualifications(newQuals);
                    updateCloud(workers, newQuals);
                }
            };

                            <IconDatabase className="w-16 h-16 text-green-500 mx-auto mb-4" />
