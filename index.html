        // --- 画像圧縮用関数 ---
        const compressImage = (file, maxWidth = 1000) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        // --- 📅 期限計算ロジック ---
        const calcKou4Expire = (dateStr, isFirst) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            let year = d.getFullYear();
            if (d.getMonth() > 3 || (d.getMonth() === 3 && d.getDate() >= 1)) {
                year++;
            }
            const addYears = isFirst ? 2 : 5;
            return `${year + addYears}-03-31`; 
        };

        const calcNormalExpire = (dateStr, years) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            d.setFullYear(d.getFullYear() + years);
            d.setDate(d.getDate() - 1);
            return d.toISOString().split('T')[0];
        };

        const getDaysUntilExpire = (dateStr) => {
            if (!dateStr) return 999;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const exp = new Date(dateStr);
            const diffTime = exp - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

            if (!dateStr) return { text: '未設定', color: 'text-gray-400', bg: '', isAlert: false };

            const healthDate = new Date(dateStr);
            const expireDate = new Date(healthDate);
            expireDate.setFullYear(expireDate.getFullYear() + 1); 
            
            const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                return { text: '期限切れ', color: 'text-red-600', bg: 'bg-red-100', isAlert: true };
            } else if (diffDays <= 30) {
                return { text: '更新間近', color: 'text-orange-600', bg: 'bg-orange-100', isAlert: true };

                const msg = error.message || "";
                const code = error.code || "";
                if (code === 'not-found' || msg.includes('has not been used') || msg.includes('does not exist')) {
                    setDbSetupRequired(true);
                } else if (code === 'permission-denied' || msg.includes('Missing or insufficient permissions')) {
                    setRulesSetupRequired(true);
                } else {
                    setAuthError(true);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                auth.signInAnonymously().catch(e => {
                    setAuthError(true);
                    setIsLoading(false);
                });
                const unsubscribe = auth.onAuthStateChanged(user => {
                    if (user) { setUser(user); setAuthError(false); }
                });
                
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                
                return () => {
                    unsubscribe();
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                };
            }, []);

            useEffect(() => {
                if (!user || useLocalMode) {
                    if (useLocalMode) setIsLoading(false);
                    return;
                }
                
                const docRef = db.collection('kawaden_data').doc('main_list');
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const remoteData = doc.data();
                        const localData = getLocalData();
                        const remoteTime = remoteData.lastUpdated || 0;
                        const localTime = localData.lastUpdated || 0;
                        
                        if (localTime > remoteTime) {
                            docRef.set(localData).catch(e => console.error(e));
                            setQualifications(localData.qualifications);
                            setWorkers(localData.workers);
                        } else {
                            const loadedQuals = remoteData.qualifications || defaultQualifications;
                            const mergedQuals = loadedQuals.map(loadedQual => {
                                const defaultQual = defaultQualifications.find(dq => dq.id === loadedQual.id);
                                return defaultQual ? { 
                                    ...loadedQual, 
                                    requiresUpdate: defaultQual.requiresUpdate, 
                                    updateIntervalYears: defaultQual.updateIntervalYears, 
                                    isKou4: defaultQual.isKou4 
                                } : loadedQual;
                            });
                            
                            setQualifications(mergedQuals);
                            setWorkers(remoteData.workers || defaultWorkers);
                            saveToLocal({ qualifications: mergedQuals, workers: remoteData.workers || defaultWorkers, lastUpdated: remoteTime });
                        }
                        setIsLoading(false);
                    } else {
                        const localData = getLocalData();
                        docRef.set(localData)
                             .then(() => setIsLoading(false))
                             .catch(handleFirestoreError);
                    }
                }, handleFirestoreError);
                return () => unsubscribe();
            }, [user, useLocalMode]);

            useEffect(() => {
                if (!selectedWorkerId || !user || useLocalMode) return;
                const imgRef = db.collection('kawaden_images').doc(selectedWorkerId);
                const unsubscribe = imgRef.onSnapshot(doc => {
                    if (doc.exists) setWorkerImages(doc.data() || {});
                    else setWorkerImages({});
                }, e => console.error("画像取得エラー:", e));
                return () => unsubscribe();
            }, [selectedWorkerId, user, useLocalMode]);

            // 🌟 修正：Firestoreエラー回避のため、明示的に undefined なプロパティを取り除く（JSONシリアライズを通す）
            const updateCloud = (newWorkers, newQuals) => {
                const timestamp = Date.now();
                // undefinedの値を保存しようとしてエラーにならないよう、一度JSONテキストにしてからオブジェクトに戻す
                const cleanWorkers = JSON.parse(JSON.stringify(newWorkers || workers));
                const cleanQuals = JSON.parse(JSON.stringify(newQuals || qualifications));
                const localData = { workers: cleanWorkers, qualifications: cleanQuals, lastUpdated: timestamp };
                
                saveToLocal(localData);

                if (!user || useLocalMode) return; 
                db.collection('kawaden_data').doc('main_list').set(localData).catch(handleFirestoreError);
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') setDeferredPrompt(null);
                } else {
                    alert('ブラウザの共有メニュー(↑)または設定(︙)から「ホーム画面に追加」を選択してください。');
                }
            };

            // 🌟 追加：職人データを汎用的にアップデートする関数
            const updateWorkerField = (id, field, value) => {
                const newWorkers = workers.map(w => w.id === id ? { ...w, [field]: value } : w);
                setWorkers(newWorkers);
                updateCloud(newWorkers, qualifications);
            };

            const updateQualDetail = (workerId, qualId, field, value, currentQual) => {
                const newWorkers = workers.map(w => {
                    if (w.id !== workerId) return w;
                    const details = w.qualDetails || {};
                    const qDetail = details[qualId] || { isFirst: true };
                    const updatedQDetail = { ...qDetail, [field]: value };
                    
                    if (field === 'acquiredDate' || field === 'isFirst') {
                        const acqDate = field === 'acquiredDate' ? value : qDetail.acquiredDate;
                        const isFirst = field === 'isFirst' ? value : qDetail.isFirst !== false;
                        if (currentQual.isKou4) {
                            updatedQDetail.expireDate = calcKou4Expire(acqDate, isFirst);
                        } else if (currentQual.updateIntervalYears) {
                            updatedQDetail.expireDate = calcNormalExpire(acqDate, currentQual.updateIntervalYears);
                        }
                    }
                    return { ...w, qualDetails: { ...details, [qualId]: updatedQDetail } };
                });
                setWorkers(newWorkers);
                updateCloud(newWorkers, qualifications);
            };

            const handleAddWorkerSubmit = (e) => {
                if (e) e.preventDefault();
                if (!newWorkerName.trim()) return;
                
                const nw = [...workers, { 
                    id: `w${Date.now()}`, 
                    name: newWorkerName.trim(), 
                    healthDate: '', 
                    isEmployee: newWorkerIsEmployee,
                    rousaiDate: newWorkerIsEmployee ? '' : newWorkerRousaiDate,
                    quals: [], 
                    qualDetails: {} 
                }];
                
                setWorkers(nw); 
                updateCloud(nw, qualifications); 
                setNewWorkerName(''); 
                setNewWorkerIsEmployee(true);
                setNewWorkerRousaiDate('');
                setShowAddModal(false);
            };

            // 🌟 修正：undefined ではなく null を使うことでFirestoreのエラーを防止する
            const handleAddQualSubmit = (e) => {
                if (e) e.preventDefault();
                if (!newQualName.trim()) return;
                const newQual = { 
                    id: `q${Date.now()}`, 
                    name: newQualName.trim(), 
                    requiresUpdate: newQualRequiresUpdate, 
                    updateIntervalYears: newQualRequiresUpdate ? newQualUpdateInterval : null,
                    isKinden: newQualIsKinden 
                };
                const newQuals = [...qualifications, newQual];
                setQualifications(newQuals);
                updateCloud(workers, newQuals);
                setNewQualName('');
                setNewQualIsKinden(false); 
                setNewQualRequiresUpdate(false);
                setNewQualUpdateInterval(5);
                setShowAddQualModal(false);
            };

            const handleImageUpload = async (workerId, qualId, file) => {
                if (!file) return;
                try {
                    const compressedBase64 = await compressImage(file, 800);
                    if (!user || useLocalMode) {
                        setWorkerImages(prev => ({...prev, [qualId]: compressedBase64}));
                        return;
                    }
                    await db.collection('kawaden_images').doc(workerId).set({ [qualId]: compressedBase64 }, { merge: true });
                } catch (e) {
                    alert("画像の保存に失敗しました。");
                }
            };

            const handleImageDelete = async (workerId, qualId) => {
                if (!confirm("この写真を削除しますか？")) return;
                if (!user || useLocalMode) {
                    const newImages = {...workerImages};
                    delete newImages[qualId];
                    setWorkerImages(newImages);
                    return;
                }
                await db.collection('kawaden_images').doc(workerId).update({ [qualId]: firebase.firestore.FieldValue.delete() });
            };

            const toggleQual = (workerId, qualId) => {
                if (isEditMode) return;
                const newWorkers = workers.map(w => {
                    if (w.id === workerId) {
                        const hasQual = w.quals.includes(qualId);
                        return { ...w, quals: hasQual ? w.quals.filter(id => id !== qualId) : [...w.quals, qualId] };
                    }
                    return w;
                });
                setWorkers(newWorkers);
                updateCloud(newWorkers, qualifications);
            };

            const moveItem = (list, setList, index, direction, isQual) => {
                const newList = [...list];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newList.length) return;
                [newList[index], newList[targetIndex]] = [newList[targetIndex], newList[index]];
                setList(newList);
                if (isQual) updateCloud(workers, newList);
                else updateCloud(newList, qualifications);
            };

            const renameItem = (id, newName, isQual) => {
                if (isQual) {
                    const newList = qualifications.map(q => q.id === id ? { ...q, name: newName } : q);
                    setQualifications(newList);
                    updateCloud(workers, newList);
                } else {
                    const newList = workers.map(w => w.id === id ? { ...w, name: newName } : w);
                    setWorkers(newList);
                    updateCloud(newList, qualifications);
                }
            };

            const deleteItem = (id, isQual) => {
                if (!confirm("本当に削除しますか？")) return;
                if (isQual) {
                    const newList = qualifications.filter(q => q.id !== id);
                    setQualifications(newList);
                    updateCloud(workers, newList);
                } else {
                    const newList = workers.filter(w => w.id !== id);
                    setWorkers(newList);
                    updateCloud(newList, qualifications);
                }
            };

            const toggleQualKinden = (qualId) => {
                const newQuals = qualifications.map(q => 
                    q.id === qualId ? { ...q, isKinden: !q.isKinden } : q
                );
                setQualifications(newQuals);
                updateCloud(workers, newQuals);
            };

            // 🌟 修正：undefined ではなく null を使う
            const toggleQualUpdate = (qualId) => {
                const qual = qualifications.find(q => q.id === qualId);
                if (!qual) return;

                if (qual.isKou4) {
                    const msg = qual.requiresUpdate ? "アラートをオフにしますか？" : "特殊ルールアラートをオンにしますか？";
                    if (confirm(`「${qual.name}」は特殊な更新ルールが設定されています。\n${msg}`)) {
                        const newQuals = qualifications.map(q => q.id === qualId ? { ...q, requiresUpdate: !q.requiresUpdate } : q);
                        setQualifications(newQuals);
                        updateCloud(workers, newQuals);
                    }
                    return;
                }

                const res = prompt(`「${qual.name}」の更新間隔（年）を入力してください。オフにする場合は「0」を入力。`, qual.requiresUpdate ? qual.updateIntervalYears : "5");
                if (res !== null) {
                    const years = parseInt(res);
                    const newQuals = qualifications.map(q => q.id === qualId ? { ...q, requiresUpdate: years > 0, updateIntervalYears: years > 0 ? years : null } : q);
                    setQualifications(newQuals);
                    updateCloud(workers, newQuals);
                }
            };

            if (rulesSetupRequired && !useLocalMode) {
                return (
                    <div className="h-screen bg-gray-50 flex items-center justify-center p-6 text-center font-sans overflow-auto">
                        <div className="bg-white border-2 border-green-200 p-8 rounded-3xl max-w-lg shadow-xl">
                            <IconDatabase className="w-16 h-16 text-green-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-black text-gray-800 mb-4">データベースの鍵を開けてください！</h2>
                            <p className="text-gray-600 mb-6 leading-relaxed">金庫の作成は成功しています！最後にルール（鍵）を設定してください。</p>
                            <button onClick={() => { setUseLocalMode(true); setIsLoading(false); }} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors shadow-lg mb-6 active:scale-95">設定を後回しにして、まずはアプリを試す！</button>
                        </div>
                    </div>
                );
            }

            if ((dbSetupRequired || authError) && !useLocalMode) {
                return (
                    <div className="h-screen bg-gray-50 flex items-center justify-center p-6 text-center font-sans overflow-auto">
                        <div className="bg-white border-2 border-blue-200 p-8 rounded-3xl max-w-lg shadow-xl">
                            <IconDatabase className="w-16 h-16 text-blue-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-black text-gray-800 mb-4">Firebaseの設定待ちです</h2>
                            <p className="text-gray-600 mb-6 leading-relaxed">クラウドの金庫（Firestore）が作られていないため、共有機能がロックされています。</p>
                            <button onClick={() => { setUseLocalMode(true); setIsLoading(false); }} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors shadow-lg mb-6 active:scale-95">設定を後回しにして、まずはアプリを試す！</button>
                        </div>
                    </div>
                );
            }

            if (isLoading) {
                return (
                    <div className="h-[100dvh] flex flex-col items-center justify-center bg-gray-50">
                        <IconLoader className="animate-spin text-blue-600 mb-4 w-10 h-10" />
                        <p className="text-gray-500 font-bold tracking-widest animate-pulse">システム立ち上げ中...</p>
                    </div>
                );
            }

            const baseCellWidth = 48; 
            const currentCellWidth = Math.max(12, baseCellWidth * zoomScale); 
            const baseHeaderHeight = 220;
            const currentHeaderHeight = Math.max(80, baseHeaderHeight * zoomScale);
            const qualFontSize = Math.max(8, 12 * zoomScale); 
            const circleFontSize = Math.max(10, 24 * zoomScale); 

            return (
                <div className="h-[100dvh] bg-white flex flex-col font-sans overflow-hidden">
                    <header className={`text-white p-3 sm:p-4 shadow-md flex justify-between items-center z-50 shrink-0 ${isEditMode ? 'bg-orange-600' : 'bg-blue-800'}`}>
                        <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                            <h1 className="text-lg sm:text-xl font-bold tracking-tighter">{isEditMode ? '設定・編集モード' : '川電 資格一覧表'}</h1>
                            <div className="flex items-center gap-2">
                                {!isEditMode && !useLocalMode && <span className="text-[10px] bg-green-500/20 text-green-300 border border-green-400 px-2 py-0.5 rounded-full animate-pulse">ONLINE</span>}
                                {useLocalMode && <span className="text-[10px] bg-gray-500/50 text-gray-200 border border-gray-400 px-2 py-0.5 rounded-full">OFFLINE</span>}
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-1 sm:gap-2">
                            {!isEditMode && (
                                <div className="flex items-center bg-black/20 rounded-lg p-0.5 mr-1">
                                    <button onClick={() => setZoomScale(z => Math.max(0.3, parseFloat((z - 0.1).toFixed(1))))} className="p-1.5 sm:p-2 hover:bg-white/20 rounded text-white active:scale-95"><IconZoomOut className="w-4 h-4" /></button>
                                    <span className="text-[10px] sm:text-xs font-bold w-8 sm:w-9 text-center text-white select-none">{Math.round(zoomScale * 100)}%</span>
                                    <button onClick={() => setZoomScale(z => Math.min(2.0, parseFloat((z + 0.1).toFixed(1))))} className="p-1.5 sm:p-2 hover:bg-white/20 rounded text-white active:scale-95"><IconZoomIn className="w-4 h-4" /></button>
                                </div>
                            )}

                            {!isEditMode && (
                                <button onClick={handleInstallClick} className="p-1.5 sm:p-2 bg-yellow-400 text-yellow-900 hover:bg-yellow-300 rounded-lg flex items-center gap-1 font-bold shadow-lg active:scale-95 transition-all mr-1">
                                    <IconDownload className="w-4 h-4" />
                                    <span className="hidden sm:inline text-xs">アプリにする</span>
                                </button>
                            )}

                            {!isEditMode && (
                                <button onClick={() => setShowAddModal(true)} className="p-2 bg-white/20 rounded-lg hover:bg-white/30 transition-colors"><IconUserPlus className="w-5 h-5" /></button>
                            )}

                            {isEditMode && (
                                <button onClick={() => setShowAddQualModal(true)} className="p-2 bg-white text-blue-600 rounded-lg flex items-center gap-1 font-bold shadow-lg active:scale-95 transition-all mr-1">
                                    <IconPlus className="w-4 h-4" />
                                    <span className="hidden sm:inline text-xs">資格追加</span>
                                </button>
                            )}

                            <button onClick={() => { setIsEditMode(!isEditMode); setZoomScale(1); }} className={`p-2 rounded-lg flex items-center gap-1 font-bold transition-all ${isEditMode ? 'bg-white text-orange-600 scale-105 shadow-lg' : 'bg-white/20 text-white'}`}>
                                {isEditMode ? <IconCheck className="w-5 h-5" /> : <IconSettings className="w-5 h-5" />}
                                <span className="hidden sm:inline">{isEditMode ? '完了' : '編集'}</span>
                            </button>
                        </div>
                    </header>

                    {!isEditMode && (
                        <div className="p-2 bg-blue-50 border-b border-blue-100 flex items-center gap-2 text-xs text-blue-800 font-bold shrink-0 shadow-inner">
                            <IconInfo className="w-4 h-4 text-blue-600 shrink-0" />
                            <span><span className="bg-blue-600 text-white px-1.5 py-0.5 rounded mr-1">きんでん</span>マークと青色の列は「きんでん大阪支社」での受講対象資格です</span>
                        </div>
                    )}

                    <div className="flex-1 overflow-auto bg-gray-100 relative">
                        <div className="inline-block min-w-full">
                            <table className="w-max min-w-full border-separate border-spacing-0 bg-white">
                                <thead>
                                    <tr>
                                        <th className="sticky top-0 left-0 z-40 bg-gray-200 border-b border-r border-gray-300 p-2 shadow-[1px_1px_0_#d1d5db] text-gray-700 text-sm align-middle"
                                            style={{ width: '180px', minWidth: '180px', maxWidth: '180px' }}>
                                            <div className="flex items-center justify-center h-full">氏名 \ 資格</div>
                                        </th>
                                        
                                        {qualifications.map((q, idx) => (
                                            <th key={q.id} 
                                                className={`sticky top-0 z-30 border-b border-r border-gray-300 p-0 ${q.isKinden ? 'bg-blue-100' : 'bg-gray-100'}`}
                                                style={{ width: `${currentCellWidth}px`, minWidth: `${currentCellWidth}px`, maxWidth: `${currentCellWidth}px`, overflow: 'hidden' }}>
                                                
                                                <div className="flex flex-col items-center justify-between py-1" style={{ height: `${currentHeaderHeight}px`, width: '100%' }}>
                                                    {isEditMode && (
                                                        <div className="flex flex-col gap-1 mb-2">
                                                            <button onClick={() => moveItem(qualifications, setQualifications, idx, -1, true)} className="p-0.5 bg-white border rounded shadow-sm flex justify-center items-center"><IconArrowUp className="w-3 h-3 rotate-270" style={{transform: 'rotate(-90deg)'}} /></button>
                                                            <button onClick={() => moveItem(qualifications, setQualifications, idx, 1, true)} className="p-0.5 bg-white border rounded shadow-sm flex justify-center items-center"><IconArrowDown className="w-3 h-3 rotate-270" style={{transform: 'rotate(-90deg)'}} /></button>
                                                            <button 
                                                                onClick={() => toggleQualKinden(q.id)} 
                                                                className={`p-0.5 border rounded shadow-sm text-[10px] font-black transition-colors flex justify-center items-center ${q.isKinden ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-100 text-gray-400 border-gray-300 hover:bg-gray-200'}`}
                                                                title="きんでん対象の切り替え"
                                                            >
                                                                K
                                                            </button>
                                                            <button 
                                                                onClick={() => toggleQualUpdate(q.id)} 
                                                                className={`p-0.5 border rounded shadow-sm transition-colors flex justify-center items-center ${q.requiresUpdate ? 'bg-orange-500 text-white border-orange-500' : 'bg-gray-100 text-gray-400 border-gray-300 hover:bg-gray-200'}`}
                                                                title="定期更新アラートの設定・切り替え"
                                                            >
                                                                <IconClock className="w-3 h-3" />
                                                            </button>
                                                            <button onClick={() => deleteItem(q.id, true)} className="p-0.5 text-red-600 bg-red-50 border border-red-200 rounded shadow-sm flex justify-center items-center"><IconTrash className="w-3 h-3" /></button>
                                                        </div>
                                                    )}
                                                    
                                                    <div className="flex-1 flex flex-col items-center justify-end gap-1 w-full overflow-hidden">
                                                        {q.isKinden && !isEditMode && (
                                                            <span className="bg-blue-600 text-white rounded flex items-center justify-center leading-none mt-1" 
                                                                  style={{ fontSize: `${Math.max(7, 10 * zoomScale)}px`, padding: zoomScale < 0.8 ? '2px' : '2px 4px' }}>
                                                                {zoomScale < 0.8 ? 'K' : 'きんでん'}
                                                            </span>
                                                        )}
                                                        {q.requiresUpdate && !isEditMode && (
                                                            <IconClock className="text-orange-500 mb-1 shrink-0" 
                                                                       style={{ width: `${Math.max(10, 14 * zoomScale)}px`, height: `${Math.max(10, 14 * zoomScale)}px` }} title="定期更新が必要です" />
                                                        )}
                                                        {isEditMode ? (
                                                            <EditableQualName qual={q} renameItem={renameItem} />
                                                        ) : (
                                                            <span style={{ writingMode: 'vertical-rl', textOrientation: 'upright', fontSize: `${qualFontSize}px` }} className="font-black tracking-widest text-gray-700 leading-none">{q.name}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {workers.map((worker, wIdx) => {
                                        const healthStatus = getHealthStatus(worker.healthDate);
                                        const rousaiStatus = getRousaiStatus(worker.isEmployee, worker.rousaiDate);
                                        
                                        return (
                                            <tr key={worker.id} className="transition-colors hover:bg-yellow-50">
                                                <td className="sticky left-0 z-20 bg-white border-b border-r border-gray-300 p-2 shadow-[1px_0_0_#d1d5db] whitespace-nowrap"
                                                    style={{ width: '180px', minWidth: '180px', maxWidth: '180px' }}>
                                                    <div className="flex items-center gap-2">
                                                        {isEditMode && (
                                                            <div className="flex flex-col gap-0.5 shrink-0">
                                                                <button onClick={() => moveItem(workers, setWorkers, wIdx, -1, false)} className="bg-gray-100 rounded border border-gray-300 p-0.5"><IconArrowUp className="w-3 h-3" /></button>
                                                                <button onClick={() => moveItem(workers, setWorkers, wIdx, 1, false)} className="bg-gray-100 rounded border border-gray-300 p-0.5"><IconArrowDown className="w-3 h-3" /></button>
                                                            </div>
                                                        )}
                                                        {isEditMode ? (
                                                            <div className="flex flex-col gap-1 w-full pr-1">
                                                                <EditableWorkerName worker={worker} renameItem={renameItem} />
                                                                <div className="flex flex-col gap-1 mt-1 bg-gray-50 p-1.5 rounded-lg border border-gray-200">
                                                                    <div className="flex items-center gap-1">
                                                                        <span className="text-[10px] font-bold text-gray-500 w-6">健診:</span>
                                                                        <EditableHealthDate worker={worker} updateWorkerField={updateWorkerField} />
                                                                    </div>
                                                                    <div className="flex items-center gap-1">
                                                                        <span className="text-[10px] font-bold text-gray-500 w-6">区分:</span>
                                                                        <EditableWorkerType worker={worker} updateWorkerField={updateWorkerField} />
                                                                    </div>
                                                                    {worker.isEmployee === false && (
                                                                        <div className="flex items-center gap-1">
                                                                            <span className="text-[10px] font-bold text-gray-500 w-6">労災:</span>
                                                                            <EditableRousaiDate worker={worker} updateWorkerField={updateWorkerField} />
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                <button onClick={() => deleteItem(worker.id, false)} className="text-[10px] text-red-500 text-center font-bold flex items-center justify-center gap-0.5 mt-1 border border-red-200 bg-red-50 rounded py-1"><IconTrash className="w-2.5 h-2.5" /> 削除</button>
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-center justify-between w-full pr-1">
                                                                <div className="flex flex-col justify-center overflow-hidden">
                                                                    <span className="font-bold text-gray-800 text-sm truncate">{worker.name}</span>
                                                                    <span className={`text-[10px] font-bold tracking-tighter mt-0.5 inline-block px-1 rounded truncate ${healthStatus.color} ${healthStatus.bg}`}>
                                                                        健診: {healthStatus.text}
                                                                    </span>
                                                                    <span className={`text-[10px] font-bold tracking-tighter mt-0.5 inline-block px-1 rounded truncate ${rousaiStatus.color} ${rousaiStatus.bg}`}>
                                                                        労災: {rousaiStatus.text}
                                                                    </span>
                                                                </div>
                                                                <button onClick={() => setSelectedWorkerId(worker.id)} className="text-blue-600 hover:text-blue-800 ml-1 bg-blue-50 hover:bg-blue-100 p-2 rounded-lg active:scale-95 shadow-sm shrink-0" title="資格詳細・写真"><IconIdCard className="w-4 h-4" /></button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </td>
                                                {qualifications.map(q => {
                                                    const hasQual = worker.quals.includes(q.id);
                                                    let statusColor = 'text-green-600';
                                                    if (hasQual && q.requiresUpdate && worker.qualDetails && worker.qualDetails[q.id]) {
                                                        const expDate = worker.qualDetails[q.id].expireDate;
                                                        if (expDate) {
                                                            const daysLeft = getDaysUntilExpire(expDate);
                                                            if (daysLeft < 0) statusColor = 'text-red-600';
                                                            else if (daysLeft <= 90) statusColor = 'text-orange-500';
                                                        }
                                                    }
                                                    return (
                                                        <td key={q.id} onClick={() => toggleQual(worker.id, q.id)} 
                                                            className={`border-b border-r border-gray-300 text-center select-none font-bold transition-colors p-0
                                                            ${hasQual ? statusColor : 'text-gray-200'} 
                                                            ${!isEditMode && 'cursor-pointer hover:bg-blue-50 active:scale-95'} 
                                                            ${q.isKinden && !isEditMode ? 'bg-blue-50/30' : ''}`}
                                                            style={{ width: `${currentCellWidth}px`, minWidth: `${currentCellWidth}px`, maxWidth: `${currentCellWidth}px`, fontSize: `${circleFontSize}px`, overflow: 'hidden' }}>
                                                            {hasQual ? '◯' : '・'}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                                <tfoot>
                                    <tr className="bg-gray-200 font-bold sticky bottom-0 z-40">
                                        <td className="sticky left-0 bg-gray-200 border-r border-gray-300 p-2 text-center shadow-[1px_-1px_0_#d1d5db] text-gray-700 text-sm" style={{ width: '180px', minWidth: '180px', maxWidth: '180px' }}>合計</td>
                                        {qualifications.map(q => {
                                            const total = workers.filter(w => w.quals.includes(q.id)).length;
                                            return (<td key={q.id} className="border-r border-gray-300 text-center shadow-[0_-1px_0_#d1d5db] text-blue-700 font-bold p-0" style={{ width: `${currentCellWidth}px`, minWidth: `${currentCellWidth}px`, maxWidth: `${currentCellWidth}px`, fontSize: `${Math.max(9, 14 * zoomScale)}px`, padding: `${Math.max(2, 8 * zoomScale)}px 0`, overflow: 'hidden' }}>{total}</td>);
                                        })}
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>

                    {/* 職人詳細・写真添付モーダル */}
                    {selectedWorkerId && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-lg shadow-2xl border border-white/20 max-h-[90vh] flex flex-col">
                                {(() => {
                                    const targetWorker = workers.find(w => w.id === selectedWorkerId);
                                    const hasQuals = targetWorker.quals.map(qid => qualifications.find(q => q.id === qid)).filter(Boolean);
                                    const details = targetWorker.qualDetails || {};
                                    const healthStatus = getHealthStatus(targetWorker.healthDate);
                                    const rousaiStatus = getRousaiStatus(targetWorker.isEmployee, targetWorker.rousaiDate);
                                    
                                    return (
                                        <>
                                            <div className="flex flex-col mb-4 border-b pb-4 shrink-0">
                                                <div className="flex justify-between items-center w-full">
                                                    <h2 className="text-xl font-black text-gray-800 flex items-center gap-2"><IconIdCard className="text-blue-600" /> {targetWorker.name} </h2>
                                                    <button onClick={() => setSelectedWorkerId(null)} className="p-2 bg-gray-100 hover:bg-gray-200 rounded-full active:scale-95"><IconX className="w-5 h-5"/></button>
                                                </div>
                                                
                                                {/* 🌟 健診・労災ステータス表示エリア */}
                                                <div className={`mt-3 p-3 rounded-xl border flex flex-col gap-3 relative ${healthStatus.isAlert || rousaiStatus.isAlert ? 'bg-orange-50 border-orange-200' : 'bg-gray-50 border-gray-200'}`}>
                                                    <button onClick={() => {setIsEditMode(true); setSelectedWorkerId(null);}} className="absolute top-3 right-3 text-xs bg-white border border-gray-300 px-3 py-1.5 rounded-lg shadow-sm font-bold text-gray-600 hover:bg-gray-100">編集</button>
                                                    <div className="flex flex-col border-b border-gray-200/50 pb-2 pr-16">
                                                        <span className="text-[10px] font-bold text-gray-500 mb-0.5">健康診断（受診日から1年有効）</span>
                                                        <span className={`text-sm font-bold ${healthStatus.color}`}>{targetWorker.healthDate ? targetWorker.healthDate.replace(/-/g, '/') : '未設定'}{healthStatus.isAlert && ` （${healthStatus.text}）`}</span>
                                                    </div>
                                                    <div className="flex flex-col pr-16">
                                                        <span className="text-[10px] font-bold text-gray-500 mb-0.5">労災保険特別加入（取得日から1年有効）</span>
                                                        <span className={`text-sm font-bold ${rousaiStatus.color}`}>
                                                            {targetWorker.isEmployee !== false ? '社員（雇用保険有のため不要）' : (targetWorker.rousaiDate ? targetWorker.rousaiDate.replace(/-/g, '/') : '未設定')}
                                                            {rousaiStatus.isAlert && ` （${rousaiStatus.text}）`}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="flex-1 overflow-auto pr-2 space-y-4 pb-4">
                                                {hasQuals.length === 0 ? <p className="text-gray-500 text-center py-8 font-bold">登録された資格がありません。</p> :
                                                    hasQuals.map(q => {
                                                        const qDetail = details[q.id] || {};
                                                        return (
                                                            <div key={q.id} className="bg-white p-4 rounded-2xl border-2 border-gray-100 flex flex-col shadow-sm">
                                                                <div className="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
                                                                    <div className="flex items-center gap-2"><p className="font-black text-gray-800 text-lg">{q.name}</p>{q.requiresUpdate && <span className="bg-orange-100 text-orange-600 text-[10px] px-2 py-0.5 rounded-full font-bold">更新あり</span>}</div>
                                                                    {workerImages[q.id] ? <div className="flex items-center gap-3 shrink-0"><img src={workerImages[q.id]} className="w-12 h-12 object-cover rounded-lg border border-gray-300 shadow-sm cursor-pointer hover:opacity-80" onClick={() => setFullScreenImage(workerImages[q.id])} /><button onClick={() => handleImageDelete(selectedWorkerId, q.id)} className="text-red-500 bg-red-50 p-1.5 rounded-lg hover:bg-red-100"><IconTrash className="w-4 h-4" /></button></div> :
                                                                    <label className="cursor-pointer inline-flex items-center gap-1 bg-blue-50 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold text-blue-700 hover:bg-blue-100 shadow-sm active:scale-95"><IconCamera className="w-4 h-4" /> 写真添付<input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleImageUpload(selectedWorkerId, q.id, e.target.files[0])} /></label>}
                                                                </div>
                                                                {q.requiresUpdate && (
                                                                    <div className="bg-gray-50 p-3 rounded-xl border border-gray-200 space-y-3">
                                                                        {q.isKou4 && <div className="flex items-center gap-2"><span className="text-xs font-bold text-gray-500">種別:</span><select value={qDetail.isFirst !== false ? 'first' : 'second'} onChange={(e) => updateQualDetail(selectedWorkerId, q.id, 'isFirst', e.target.value === 'first', q)} className="border border-gray-300 rounded p-1 text-xs font-bold bg-white text-gray-700 focus:border-blue-500 outline-none"><option value="first">初回（免状交付から2年以内）</option><option value="second">2回目以降（受講から5年以内）</option></select></div>}
                                                                        <div className="flex gap-4"><div className="flex-1"><label className="block text-[10px] font-bold text-gray-400 mb-1">{q.isKou4 ? (qDetail.isFirst !== false ? '免状交付日' : '講習受講日') : '取得・受講日'}</label><input type="date" value={qDetail.acquiredDate || ''} onChange={(e) => updateQualDetail(selectedWorkerId, q.id, 'acquiredDate', e.target.value, q)} className="w-full border border-gray-300 rounded-lg p-2 text-sm font-bold text-gray-700 focus:border-blue-500 outline-none" /></div><div className="flex-1"><label className="block text-[10px] font-bold text-gray-400 mb-1 flex justify-between">更新期限（予定日）{q.updateIntervalYears && <span className="text-blue-500 font-normal">{q.updateIntervalYears}年毎</span>}</label><input type="date" value={qDetail.expireDate || ''} onChange={(e) => updateQualDetail(selectedWorkerId, q.id, 'expireDate', e.target.value, q)} className={`w-full border rounded-lg p-2 text-sm font-bold outline-none ${getDaysUntilExpire(qDetail.expireDate) < 0 ? 'border-red-500 text-red-600 bg-red-50' : getDaysUntilExpire(qDetail.expireDate) <= 90 ? 'border-orange-400 text-orange-600 bg-orange-50' : 'border-gray-300 text-gray-700'}`} /></div></div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })
                                                }
                                            </div>
                                            <div className="pt-4 border-t text-right shrink-0"><button onClick={() => setSelectedWorkerId(null)} className="px-8 py-3 bg-gray-800 text-white font-bold rounded-2xl shadow-lg hover:bg-gray-700 active:scale-95">閉じる</button></div>
                                        </>
                                    )
                                })()}
                            </div>
                        </div>
                    )}

                    {fullScreenImage && <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-[200] p-4 backdrop-blur-md" onClick={() => setFullScreenImage(null)}><img src={fullScreenImage} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl" /><button className="absolute top-6 right-6 text-white bg-black/50 p-3 rounded-full hover:bg-white/20"><IconX className="w-6 h-6" /></button></div>}

                    {/* 🌟 職人の追加用モーダル（区分選択対応） */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border border-white/20">
                                <h2 className="text-xl font-black mb-6 text-gray-800 flex items-center gap-2"><IconUserPlus className="text-blue-600" /> 職人の新規追加</h2>
                                <form onSubmit={handleAddWorkerSubmit}>
                                    <div className="mb-6">
                                        <label className="block text-xs font-bold text-gray-400 mb-2 px-1 uppercase tracking-widest">お名前</label>
                                        <input type="text" value={newWorkerName} onChange={e => setNewWorkerName(e.target.value)} placeholder="例：川口 雄志" className="w-full border-2 border-gray-100 p-3 rounded-2xl outline-none focus:border-blue-600 text-lg font-bold" autoFocus />
                                    </div>
                                    <div className="mb-6 px-1">
                                        <label className="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">区分（雇用保険の有無）</label>
                                        <div className="flex gap-6">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${newWorkerIsEmployee ? 'border-blue-600' : 'border-gray-300'}`}>
                                                    {newWorkerIsEmployee && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full" />}
                                                </div>
                                                <span className="text-sm font-bold text-gray-700">社員</span>
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${!newWorkerIsEmployee ? 'border-blue-600' : 'border-gray-300'}`}>
                                                    {!newWorkerIsEmployee && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full" />}
                                                </div>
                                                <span className="text-sm font-bold text-gray-700">一人親方・事業主</span>
                                            </label>
                                        </div>
                                    </div>
                                    {!newWorkerIsEmployee && (
                                        <div className="mb-8 px-1">
                                            <label className="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">労災保険特別加入 取得日</label>
                                            <input type="date" value={newWorkerRousaiDate} onChange={e => setNewWorkerRousaiDate(e.target.value)} className="w-full border-2 border-gray-100 p-3 rounded-2xl outline-none focus:border-blue-600 text-sm font-bold text-gray-600" />
                                        </div>
                                    )}
                                    <div className="flex justify-end gap-3 font-bold mt-8">
                                        <button type="button" onClick={() => setShowAddModal(false)} className="px-6 py-2 text-gray-400 hover:text-gray-600">戻る</button>
                                        <button type="button" onMouseDown={(e) => { e.preventDefault(); handleAddWorkerSubmit(e); }} onTouchStart={(e) => { e.preventDefault(); handleAddWorkerSubmit(e); }} className="px-8 py-3 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-200 active:scale-95">追加する</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showAddQualModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border border-white/20">
                                <h2 className="text-xl font-black mb-6 text-gray-800 flex items-center gap-2"><IconPlus className="text-blue-600" /> 資格の新規追加</h2>
                                <form onSubmit={handleAddQualSubmit}><div className="mb-4"><label className="block text-xs font-bold text-gray-400 mb-2 px-1 uppercase tracking-widest">資格名</label><input type="text" value={newQualName} onChange={e => setNewQualName(e.target.value)} placeholder="例：フルハーネス型墜落制止用器具" className="w-full border-2 border-gray-100 p-3 rounded-2xl outline-none focus:border-blue-600 text-sm font-bold" autoFocus /></div><div className="mb-4 pl-1 flex items-center gap-2 cursor-pointer" onClick={() => setNewQualIsKinden(!newQualIsKinden)}><div className={`w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${newQualIsKinden ? 'bg-blue-600 border-blue-600' : 'bg-white border-gray-300'}`}>{newQualIsKinden && <IconCheck className="w-4 h-4 text-white" />}</div><span className="text-sm font-bold text-gray-700">きんでん講習対象（青色にする）</span></div><div className={`mb-2 pl-1 flex items-center gap-2 cursor-pointer ${!newQualRequiresUpdate ? 'pb-6' : ''}`} onClick={() => setNewQualRequiresUpdate(!newQualRequiresUpdate)}><div className={`w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${newQualRequiresUpdate ? 'bg-orange-500 border-orange-500' : 'bg-white border-gray-300'}`}>{newQualRequiresUpdate && <IconCheck className="w-4 h-4 text-white" />}</div><span className="text-sm font-bold text-gray-700">定期更新が必要な資格</span></div>{newQualRequiresUpdate && <div className="mb-6 pl-8 flex items-center gap-2"><span className="text-xs font-bold text-gray-500">更新間隔:</span><input type="number" min="1" max="10" value={newQualUpdateInterval} onChange={(e) => setNewQualUpdateInterval(parseInt(e.target.value) || 1)} className="w-16 border-2 border-gray-200 p-1.5 rounded-lg outline-none text-center text-sm font-bold" /><span className="text-xs font-bold text-gray-500">年毎</span></div>}<div className="flex justify-end gap-3 font-bold"><button type="button" onClick={() => { setShowAddQualModal(false); setNewQualIsKinden(false); setNewQualRequiresUpdate(false); setNewQualUpdateInterval(5); }} className="px-6 py-2 text-gray-400 hover:text-gray-600">戻る</button><button type="button" onMouseDown={(e) => { e.preventDefault(); handleAddQualSubmit(e); }} onTouchStart={(e) => { e.preventDefault(); handleAddQualSubmit(e); }} className="px-8 py-3 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-200 active:scale-95">追加する</button></div></form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
